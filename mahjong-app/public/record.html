沒問題，我幫你在「縮圖產製器」區塊內新增了一個勾選鍵（預設為勾選，會顯示將數；取消勾選則只會顯示日期，非常適合拿來做直播縮圖）。

以下是修改後的完整程式碼：

```html
<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>戰績查詢 - 胡牌人生</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      line-height: 1.6;
    }

    input,
    select,
    button {
      font-size: 1rem;
      margin: 4px 2px;
      padding: 6px 10px;
    }

    #queryResult {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9f9f9;
      white-space: pre-line;
    }

    .thumbnail-section {
      margin-top: 30px;
      padding: 20px;
      border: 2px dashed #bbb;
      border-radius: 8px;
      background: #fff;
    }

    #thumbnailCanvas {
      max-width: 100%;
      height: auto;
      margin-top: 15px;
      border: 1px solid #000;
      display: none;
    }

    /* 新增勾選框的排版樣式 */
    .checkbox-label {
      margin-left: 15px;
      font-size: 0.95rem;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h2>戰績查詢系統</h2>

  <p>
    日期：<input type="date" id="datePicker">
    將數：
    <select id="dealerCount">
      <option value="1">第一將</option>
      <option value="2">第二將</option>
      <option value="3">第三將</option>
      <option value="4">第四將</option>
      <option value="5">第五將</option>
      <option value="6">第六將</option>
      <option value="7">第七將</option>
      <option value="8">第八將</option>
    </select>
    <button id="queryBtn">查詢</button>
  </p>

  <div id="queryResult">尚未查詢</div>

  <!-- 縮圖產生器區塊 -->
  <div class="thumbnail-section">
    <h3>YouTube 縮圖產製器 (手機小圖極清晰版)</h3>
    <p>
      大標題 (3~5字)：<input type="text" id="thumbTitle" placeholder="例如：連八拉八！">
      選擇影片背景：<input type="file" id="videoFile" accept="video/*">
    </p>
    <p>
      <!-- 新增：是否顯示將數的自訂勾選鍵 -->
      <label class="checkbox-label"><input type="checkbox" id="showRoundText" checked> 顯示將數資訊 (直播縮圖請取消勾選)</label>
    </p>
    <p>
      <button id="genThumbBtn">生成設計感縮圖</button>
      <button id="downloadThumbBtn" style="display:none;">下載縮圖</button>
    </p>
    <canvas id="thumbnailCanvas" width="1280" height="720"></canvas>
  </div>

  <script>
    let globalPlayers = "";
    let globalDate = "";
    let globalRoundText = "";

    document.getElementById('queryBtn').addEventListener('click', () => {
      const selectedDate = document.getElementById('datePicker').value;
      const dealerCount = document.getElementById('dealerCount').value;
      
      const dealerSelect = document.getElementById('dealerCount');
      globalRoundText = dealerSelect.options[dealerSelect.selectedIndex].text;

      if (!selectedDate) {
        alert("請先選擇日期");
        return;
      }

      fetch(`/stats?date=${selectedDate}&round_number=${dealerCount}`)
        .then(res => res.json())
        .then(data => {
          if (Array.isArray(data) && data.length > 0) {
            globalPlayers = data.slice(0, 4).map(record => record.player_name).join(" ");
          } else {
            globalPlayers = "胡牌人生";
          }
          globalDate = selectedDate.replace(/-/g, '.');

          const playerNames = data.slice(0, 4).map(record => record.player_name).join(",");
          let resultText = `${playerNames}\n\n`;

          resultText += "歡迎來到《胡牌人生》！ 👉純屬娛樂與分享，無賭博行為\n麻將愛好者的天堂，體驗自摸與爆胡快感，每局都是精彩對決！\n\n" +
            "享受更高畫質：\n設定 ⚙️ 》畫質 》進階，選擇解析度\n\n" +
            "本局戰績：\n";

          if (Array.isArray(data) && data.length > 0) {
            data.slice(0, 4).forEach(record => {
              resultText += `🔹 ${record.player_name}：${record.total_score}\n`;
            });
          } else {
            resultText += "暫無資料\n";
          }

          resultText += "\n📌 記得訂閱、按讚，開啟小鈴鐺，不錯過每場刺激對戰！\n#胡牌人生 #麻將 #麻將對戰";

          document.getElementById('queryResult').textContent = resultText;
        })
        .catch(err => {
          console.error("查詢錯誤", err);
          alert("查詢失敗，請稍後再試");
        });
    });

    document.getElementById('genThumbBtn').addEventListener('click', () => {
      const videoInput = document.getElementById('videoFile');
      const canvas = document.getElementById('thumbnailCanvas');
      const ctx = canvas.getContext('2d');
      const titleInput = document.getElementById('thumbTitle').value.trim();
      
      // 檢查使用者是否有勾選顯示將數
      const isShowRound = document.getElementById('showRoundText').checked;

      if (!globalDate) {
        alert("請先完成上方的「戰績查詢」。");
        return;
      }
      if (!videoInput.files || videoInput.files.length === 0) {
        alert("請選擇一個影片檔案作為背景。");
        return;
      }

      const file = videoInput.files[0];
      const videoUrl = URL.createObjectURL(file);
      const video = document.createElement('video');
      video.src = videoUrl;
      video.muted = true;
      video.playsInline = true;

      video.addEventListener('loadeddata', () => {
        const randomTime = Math.random() * (video.duration * 0.8) + (video.duration * 0.1);
        video.currentTime = randomTime;
      });

      video.addEventListener('seeked', () => {
        // 1. 繪製原始影片背景
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // 2. 繪製頂部 [玩家名字]
        ctx.save();
        ctx.font = "900 52px system-ui, -apple-system, sans-serif"; 
        const playersText = ` 👤 ${globalPlayers} `;
        const pWidth = ctx.measureText(playersText).width;
        
        ctx.fillStyle = "#111111";
        ctx.fillRect(40, 65, pWidth + 20, 70);
        
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#ffffff";
        ctx.fillText(playersText, 50, 100);
        ctx.restore();

        // 3. 繪製中左側 [大標題]
        if (titleInput) {
          ctx.save();
          ctx.font = "900 110px Arial Black, Impact, sans-serif"; 
          ctx.textBaseline = "middle";

          const textX = 50;
          const textY = 260;

          ctx.fillStyle = "#000000";
          for (let i = 1; i <= 12; i++) {
            ctx.fillText(titleInput, textX + i, textY + i);
          }

          ctx.strokeStyle = "#000000";
          ctx.lineWidth = 24;
          ctx.lineJoin = "round";
          ctx.strokeText(titleInput, textX, textY);

          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 6;
          ctx.strokeText(titleInput, textX, textY);

          const gradient = ctx.createLinearGradient(textX, textY - 50, textX, textY + 50);
          gradient.addColorStop(0, "#ffea00");
          gradient.addColorStop(1, "#ff4500");
          ctx.fillStyle = gradient;
          ctx.fillText(titleInput, textX, textY);
          ctx.restore();
        }

        // 4. 繪製左下角 [日期標籤] (依據勾選狀態決定要不要加上將數)
        ctx.save();
        ctx.font = "900 48px system-ui, -apple-system, sans-serif";
        
        // 判斷是否加上將數文字的空格
        const dateText = isShowRound 
          ? ` 📅 ${globalDate}  ${globalRoundText} ` 
          : ` 📅 ${globalDate} `;
          
        const dWidth = ctx.measureText(dateText).width;

        // 實心正紅底塊
        ctx.fillStyle = "#ff1e27";
        ctx.fillRect(40, 535, dWidth + 20, 65);

        // 純白字體
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#ffffff";
        ctx.fillText(dateText, 50, 567);
        ctx.restore();

        canvas.style.display = "block";
        document.getElementById('downloadThumbBtn').style.display = "inline-block";
        
        URL.revokeObjectURL(videoUrl);
      });
    });

    document.getElementById('downloadThumbBtn').addEventListener('click', () => {
      const canvas = document.getElementById('thumbnailCanvas');
      const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `thumbnail_${globalDate || 'video'}.jpg`;
      a.click();
    });
  </script>
</body>

</html>

```
